<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Einsatzüberwachung wird gestartet...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a237e 0%, #0d47a1 50%, #1565c0 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        .logo {
            width: 180px;
            height: 180px;
            margin-bottom: 2rem;
            animation: pulse 2s ease-in-out infinite;
            border-radius: 20px;
        }
        
        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            text-align: center;
        }
        
        .subtitle {
            color: rgba(255,255,255,0.8);
            font-size: 1rem;
            margin-bottom: 2rem;
        }
        
        .status {
            color: rgba(255,255,255,0.9);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        
        .progress-container {
            width: 250px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 1rem;
        }
        
        .progress-bar {
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 2px;
            animation: loading 1.5s ease-in-out infinite;
        }
        
        .time {
            color: rgba(255,255,255,0.6);
            font-size: 0.85rem;
        }
        
        .error {
            display: none;
            background: rgba(255,255,255,0.1);
            padding: 1rem 2rem;
            border-radius: 8px;
            margin-top: 2rem;
            text-align: center;
        }
        
        .error a {
            color: #90caf9;
            text-decoration: none;
        }
        
        .error a:hover {
            text-decoration: underline;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }
        
        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
    </style>
</head>
<body>
    <img src="logo-512.png" alt="Logo" class="logo" onerror="this.style.display='none'">
    <h1>Einsatzüberwachung</h1>
    <div class="subtitle">Rettungshunde-Einsatz-Koordination</div>
    <div class="status" id="status">Server wird gestartet...</div>
    <div class="progress-container">
        <div class="progress-bar"></div>
    </div>
    <div class="time" id="time">Warte seit 0 Sekunden</div>
    
    <div class="error" id="error">
        <p>Der Server antwortet nicht.</p>
        <p style="margin-top: 0.5rem;"><a href="javascript:location.reload()">Erneut versuchen</a></p>
    </div>

    <script>
        const APP_URL = 'https://localhost:7059';
        const MAX_WAIT_SECONDS = 120;
        
        let startTime = Date.now();
        let attempts = 0;
        
        function updateTime() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('time').textContent = `Warte seit ${elapsed} Sekunden`;
        }
        
        function updateStatus(text) {
            document.getElementById('status').textContent = text;
        }
        
        async function checkServer() {
            attempts++;
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            
            if (elapsed > MAX_WAIT_SECONDS) {
                document.getElementById('error').style.display = 'block';
                updateStatus('Zeitüberschreitung');
                return;
            }
            
            try {
                // Versuche die App zu erreichen
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 3000);
                
                const response = await fetch(APP_URL, {
                    method: 'HEAD',
                    mode: 'no-cors',
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                // Bei no-cors können wir den Status nicht prüfen,
                // aber wenn kein Fehler kommt, ist der Server da
                updateStatus('Server bereit! Weiterleitung...');
                
                // Kurz warten damit die Meldung sichtbar ist
                setTimeout(() => {
                    window.location.href = APP_URL;
                }, 500);
                
            } catch (error) {
                // Server noch nicht bereit
                if (attempts % 3 === 0) {
                    updateStatus('Server wird gestartet...');
                } else if (attempts % 3 === 1) {
                    updateStatus('Verbindung wird hergestellt...');
                } else {
                    updateStatus('Bitte warten...');
                }
                
                // Erneut versuchen
                setTimeout(checkServer, 1000);
            }
        }
        
        // Zeit-Anzeige aktualisieren
        setInterval(updateTime, 1000);
        
        // Server-Check starten
        checkServer();
    </script>
</body>
</html>
