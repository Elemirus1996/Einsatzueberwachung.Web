<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Einsatzüberwachung wird gestartet...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a237e 0%, #0d47a1 50%, #1565c0 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        .logo {
            width: 180px;
            height: 180px;
            margin-bottom: 2rem;
            animation: pulse 2s ease-in-out infinite;
            border-radius: 20px;
        }
        
        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            text-align: center;
        }
        
        .subtitle {
            color: rgba(255,255,255,0.8);
            font-size: 1rem;
            margin-bottom: 2rem;
        }
        
        .status {
            color: rgba(255,255,255,0.9);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        
        .progress-container {
            width: 250px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 1rem;
        }
        
        .progress-bar {
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 2px;
            animation: loading 1.5s ease-in-out infinite;
        }
        
        .time {
            color: rgba(255,255,255,0.6);
            font-size: 0.85rem;
        }
        
        .error {
            display: none;
            background: rgba(255,255,255,0.1);
            padding: 1rem 2rem;
            border-radius: 8px;
            margin-top: 2rem;
            text-align: center;
        }
        
        .error a {
            color: #90caf9;
            text-decoration: none;
        }
        
        .error a:hover {
            text-decoration: underline;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }
        
        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
    </style>
</head>
<body>
    <img src="logo-512.png" alt="Logo" class="logo" onerror="this.style.display='none'">
    <h1>Einsatzüberwachung</h1>
    <div class="subtitle">Rettungshunde-Einsatz-Koordination</div>
    <div class="status" id="status">Server wird gestartet...</div>
    <div class="progress-container">
        <div class="progress-bar"></div>
    </div>
    <div class="time" id="time">Warte seit 0 Sekunden</div>
    
    <button id="openBtn" onclick="window.location.href='https://localhost:5001'" 
            style="margin-top: 1.5rem; padding: 0.8rem 2rem; font-size: 1rem; background: white; color: #1a237e; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; display: none;">
        Anwendung öffnen
    </button>
    
    <div class="error" id="error">
        <p>Der Server antwortet nicht.</p>
        <p style="margin-top: 0.5rem;"><a href="javascript:location.reload()">Erneut versuchen</a></p>
    </div>

    <script>
        const APP_URL = 'https://localhost:5001';
        const MAX_WAIT_SECONDS = 120;
        const CHECK_INTERVAL = 2000; // Alle 2 Sekunden prüfen
        
        let startTime = Date.now();
        let attempts = 0;
        let redirecting = false;
        
        function updateTime() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('time').textContent = `Warte seit ${elapsed} Sekunden`;
        }
        
        function updateStatus(text) {
            document.getElementById('status').textContent = text;
        }
        
        function tryRedirect() {
            if (redirecting) return;
            redirecting = true;
            updateStatus('Weiterleitung zur Anwendung...');
            window.location.href = APP_URL;
        }
        
        function checkServer() {
            attempts++;
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            
            if (elapsed > MAX_WAIT_SECONDS) {
                document.getElementById('error').style.display = 'block';
                updateStatus('Zeitüberschreitung - klicken Sie auf den Link unten');
                return;
            }
            
            // Verwende ein verstecktes iframe zum Testen
            const iframe = document.createElement('iframe');
            iframe.style.cssText = 'position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;';
            
            let handled = false;
            
            // onload wird ausgelöst wenn die Seite im iframe lädt
            iframe.onload = function() {
                if (handled) return;
                handled = true;
                
                // Prüfe ob es wirklich unsere Seite ist
                try {
                    // Wenn wir hier sind, hat der iframe etwas geladen
                    setTimeout(() => {
                        if (iframe.parentNode) iframe.parentNode.removeChild(iframe);
                        tryRedirect();
                    }, 100);
                } catch(e) {
                    // Cross-origin - aber das bedeutet der Server läuft!
                    setTimeout(() => {
                        if (iframe.parentNode) iframe.parentNode.removeChild(iframe);
                        tryRedirect();
                    }, 100);
                }
            };
            
            document.body.appendChild(iframe);
            iframe.src = APP_URL;
            
            // Timeout für diesen Versuch
            setTimeout(() => {
                if (handled) return;
                handled = true;
                
                try { 
                    if (iframe.parentNode) iframe.parentNode.removeChild(iframe); 
                } catch(e) {}
                
                // Status rotieren
                const messages = [
                    'Server wird gestartet...',
                    'Bitte warten...',
                    'Verbindung wird hergestellt...'
                ];
                updateStatus(messages[attempts % messages.length]);
                
                // Nach 5 Versuchen den manuellen Button anzeigen
                if (attempts >= 5) {
                    document.getElementById('openBtn').style.display = 'block';
                }
                
                // Nächster Versuch
                setTimeout(checkServer, CHECK_INTERVAL);
            }, 3000);
        }
        
        // Zeit-Anzeige aktualisieren
        setInterval(updateTime, 1000);
        
        // Button nach 10 Sekunden trotzdem anzeigen
        setTimeout(() => {
            document.getElementById('openBtn').style.display = 'block';
        }, 10000);
        
        // Server-Check starten
        checkServer();
    </script>
</body>
</html>
